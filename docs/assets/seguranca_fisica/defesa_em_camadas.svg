<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Defesa em camadas para seguranca fisica</title>
  <desc id="desc">Diagrama com quatro camadas: perimetro, entrada controlada, area restrita e ativo critico, com controles associados.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f4ea"/>
      <stop offset="100%" stop-color="#e7eef7"/>
    </linearGradient>
    <style>
      .label { font: 700 28px Arial, sans-serif; fill: #17324d; }
      .text { font: 500 20px Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 18px Arial, sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #d6dee8; stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#bg)"/>
  <text x="60" y="70" class="label">Defesa em camadas</text>
  <text x="60" y="108" class="text">Acesso fisico eficaz combina atrasar, detectar, registrar e responder.</text>

  <rect x="70" y="150" width="1060" height="470" rx="34" fill="#d8e9d7" stroke="#7aa774" stroke-width="3"/>
  <rect x="170" y="230" width="860" height="310" rx="30" fill="#f8e3b3" stroke="#c5972f" stroke-width="3"/>
  <rect x="290" y="300" width="620" height="170" rx="28" fill="#f7c8a1" stroke="#ca7440" stroke-width="3"/>
  <rect x="470" y="346" width="260" height="78" rx="24" fill="#d4d7f7" stroke="#5c66c8" stroke-width="3"/>

  <text x="100" y="188" class="label">1. Perimetro</text>
  <text x="200" y="268" class="label">2. Entrada controlada</text>
  <text x="318" y="338" class="label">3. Area restrita</text>
  <text x="520" y="392" class="label">4. Ativo critico</text>

  <g>
    <rect x="90" y="470" width="250" height="110" class="card"/>
    <text x="115" y="508" class="text">Perimetro</text>
    <text x="115" y="540" class="small">Cerca, portao, bollard,</text>
    <text x="115" y="566" class="small">iluminacao, guarita</text>
  </g>

  <g>
    <rect x="365" y="470" width="250" height="110" class="card"/>
    <text x="390" y="508" class="text">Entrada</text>
    <text x="390" y="540" class="small">Catraca, cracha, biometria,</text>
    <text x="390" y="566" class="small">mantrap, visitante</text>
  </g>

  <g>
    <rect x="640" y="470" width="250" height="110" class="card"/>
    <text x="665" y="508" class="text">Sala sensivel</text>
    <text x="665" y="540" class="small">CFTV, sensores, trilha de</text>
    <text x="665" y="566" class="small">acesso, escolta</text>
  </g>

  <g>
    <rect x="915" y="470" width="180" height="110" class="card"/>
    <text x="940" y="508" class="text">Servico</text>
    <text x="940" y="540" class="small">Energia, fogo,</text>
    <text x="940" y="566" class="small">agua, HVAC</text>
  </g>

  <line x1="350" y1="525" x2="365" y2="525" stroke="#334155" stroke-width="3"/>
  <line x1="625" y1="525" x2="640" y2="525" stroke="#334155" stroke-width="3"/>
  <line x1="900" y1="525" x2="915" y2="525" stroke="#334155" stroke-width="3"/>
</svg>
